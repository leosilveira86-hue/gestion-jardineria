<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesti脙鲁nVerde</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark:#1a2e1a;--green-mid:#2d5a27;--green-accent:#6dbd5a;--green-pale:#e8f5e4;
    --earth:#8B6914;--earth-light:#f5edd6;--white:#f9faf7;--gray-100:#f0f2ee;
    --gray-200:#dde3d9;--gray-400:#8a9686;--gray-600:#4a5247;--text:#1a2419;
    --danger:#c0392b;--warning:#e67e22;--radius:12px;--shadow:0 2px 16px rgba(26,46,26,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}
  .header{background:var(--green-dark);color:white;padding:18px 20px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
  .header-title{font-size:18px;font-weight:600}
  .header-sub{font-size:11px;color:var(--green-accent);font-weight:500;margin-top:1px}
  .nav{display:flex;background:white;border-bottom:1px solid var(--gray-200);overflow-x:auto;position:sticky;top:66px;z-index:99}
  .nav::-webkit-scrollbar{display:none}
  .nav-btn{flex:none;padding:12px 16px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--gray-400);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
  .nav-btn.active{color:var(--green-mid);border-bottom-color:var(--green-accent)}
  .content{padding:16px}
  .card{background:white;border-radius:var(--radius);border:1px solid var(--gray-200);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .card-title{font-size:15px;font-weight:600}
  .card-sub{font-size:12px;color:var(--gray-400);margin-top:2px}
  .card-body{font-size:13px;color:var(--gray-600)}
  .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
  .badge-pending{background:#fff3cd;color:#856404}
  .badge-progress{background:#cfe2ff;color:#084298}
  .badge-done{background:var(--green-pale);color:var(--green-mid)}
  .badge-active{background:var(--green-pale);color:var(--green-mid)}
  .badge-paused{background:#f8d7da;color:#842029}
  .badge-type{background:var(--earth-light);color:var(--earth)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
  .btn-primary{background:var(--green-mid);color:white}
  .btn-secondary{background:var(--gray-100);color:var(--gray-600)}
  .btn-danger{background:#fde8e8;color:var(--danger)}
  .btn-sm{padding:6px 12px;font-size:12px}
  .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--green-mid);color:white;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(45,90,39,.4);z-index:200}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end}
  .modal-overlay.open{display:flex}
  .modal{background:white;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-title{font-size:17px;font-weight:700;margin-bottom:20px}
  .modal-close{float:right;background:var(--gray-100);border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .form-group{margin-bottom:14px}
  .form-label{font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px}
  .form-control{width:100%;padding:11px 13px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:white;transition:border-color .2s;appearance:none}
  .form-control:focus{outline:none;border-color:var(--green-accent)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-actions{display:flex;gap:10px;margin-top:20px}
  .form-actions .btn{flex:1;justify-content:center}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .stat-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;text-align:center}
  .stat-num{font-size:28px;font-weight:700;color:var(--green-mid)}
  .stat-label{font-size:11px;color:var(--gray-400);margin-top:2px;font-weight:500}
  .task-item{display:flex;align-items:flex-start;gap:12px;padding:14px;background:white;border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:10px}
  .task-check{width:22px;height:22px;border:2px solid var(--gray-200);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s}
  .task-check.done{background:var(--green-accent);border-color:var(--green-accent);color:white;font-size:12px}
  .task-info{flex:1}
  .task-title{font-size:14px;font-weight:600}
  .task-meta{font-size:12px;color:var(--gray-400);margin-top:3px}
  .empty{text-align:center;padding:40px 20px;color:var(--gray-400)}
  .empty-icon{font-size:40px;margin-bottom:10px}
  .empty-text{font-size:14px}
  .loading{text-align:center;padding:30px;color:var(--gray-400);font-size:14px}
  .spinner{width:28px;height:28px;border:3px solid var(--gray-200);border-top-color:var(--green-accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .section-title{font-size:13px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;margin-top:6px}
  .type-selector{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
  .type-btn{padding:10px 6px;border:2px solid var(--gray-200);border-radius:10px;background:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--gray-400);cursor:pointer;text-align:center;transition:all .2s}
  .type-btn.selected{border-color:var(--green-accent);color:var(--green-mid);background:var(--green-pale)}
  .type-btn .type-icon{font-size:20px;display:block;margin-bottom:4px}
  .section-divider{font-size:12px;font-weight:700;color:var(--green-mid);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--green-pale)}
  .hidden{display:none!important}
  .contact-card{background:var(--gray-100);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;color:var(--gray-600)}
  .contact-row{display:flex;gap:6px;align-items:center;padding:3px 0}
</style>
</head>
<body>
<div class="header">
  <img style="height:30px;object-fit:contain" src="https://cireneos.org/wp-content/uploads/2024/02/logo_horizontal_blanco.png" alt="Cireneos">
  <button id="notif-btn" onclick="toggleNotif()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:white;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">馃敂 Activar alertas</button>
</div>
<nav class="nav">
  <button class="nav-btn active" onclick="showTab('dashboard')">冒聼聯聤 Inicio</button>
  <button class="nav-btn" onclick="showTab('tareas')">芒聹聟 Tareas</button>
  <button class="nav-btn" onclick="showTab('clientes')">冒聼聭陇 Clientes</button>
  <button class="nav-btn" onclick="showTab('equipo')">冒聼聭路 Equipo</button>
</nav>
<div class="content" id="main-content"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
<button class="fab" onclick="openFab()">茂录聥</button>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>
<script>
const SB='https://hpcyhqxzdxrhnbquekqz.supabase.co',KEY='sb_publishable_w-IClSpBRLKhWEFBXhqKfg_kpZI1SSK';
let tab='dashboard',CL=[],US=[],SV=[],TA=[],RO=[];

async function api(p,m='GET',b=null){
  const o={method:m,headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':m==='POST'?'return=representation':''}};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(SB+'/rest/v1/'+p,o);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  if(r.status===204)return[];
  return r.json();
}

async function load(){
  try{
    [CL,US,SV,TA,RO]=await Promise.all([
      api('clientes?select=*,usuarios(nombre)&order=creado_en.desc'),
      api('usuarios?select=*,roles(nombre)&order=nombre'),
      api('servicios?select=*'),
      api('tareas?select=*,clientes(nombre),usuarios(nombre),servicios(nombre)&order=fecha_programada.asc'),
      api('roles?select=*')
    ]);
  }catch(e){console.error(e);}
}

function showTab(t){
  tab=t;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['dashboard','tareas','clientes','equipo'][i]===t));
  render();
}

function render(){
  const el=document.getElementById('main-content');
  if(tab==='dashboard')el.innerHTML=rDash();
  if(tab==='tareas')el.innerHTML=rTareas();
  if(tab==='clientes')el.innerHTML=rClientes();
  if(tab==='equipo')el.innerHTML=rEquipo();
}

function rDash(){
  const p=TA.filter(t=>t.estado==='Pendiente').length;
  const d=TA.filter(t=>t.estado==='Completado').length;
  const hoy=new Date().toISOString().split('T')[0];
  const hT=TA.filter(t=>t.fecha_programada===hoy);
  const ip=TA.filter(t=>t.estado==='En progreso');
  return '<div class="stats-grid">'+
    '<div class="stat-card"><div class="stat-num">'+CL.length+'</div><div class="stat-label">Clientes</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+TA.length+'</div><div class="stat-label">Tareas</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:var(--warning)">'+p+'</div><div class="stat-label">Pendientes</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:var(--green-mid)">'+d+'</div><div class="stat-label">Completadas</div></div>'+
    '</div><div class="section-title">Tareas de hoy</div>'+
    (hT.length===0?'<div class="empty"><div class="empty-icon">芒聵聙茂赂聫</div><div class="empty-text">No hay tareas para hoy</div></div>':hT.map(tI).join(''))+
    (ip.length>0?'<div class="section-title" style="margin-top:16px">冒聼聰聞 En progreso</div>'+ip.map(tI).join(''):'');
}

function tI(t){
  return '<div class="task-item">'+
    '<div class="task-check '+(t.estado==='Completado'?'done':'')+'" onclick="tog(\''+t.id+'\',\''+t.estado+'\')">'+(t.estado==='Completado'?'芒聹聯':'')+'</div>'+
    '<div class="task-info">'+
      '<div class="task-title">'+t.titulo+'</div>'+
      '<div class="task-meta">'+(t.clientes?.nombre||'芒聙聰')+' 脗路 '+(t.usuarios?.nombre||'Sin asignar')+(t.hora_inicio?' 脗路 '+t.hora_inicio.slice(0,5):'')+'</div>'+
      '<span class="badge '+(t.estado==='Pendiente'?'badge-pending':t.estado==='En progreso'?'badge-progress':'badge-done')+'">'+t.estado+'</span>'+
    '</div>'+
    '<button class="btn btn-sm btn-secondary" onclick="edT(\''+t.id+'\')">芒聹聫茂赂聫</button>'+
  '</div>';
}

function rTareas(){
  return '<div class="section-title">Tareas ('+TA.length+')</div>'+
    (TA.length===0?'<div class="empty"><div class="empty-icon">芒聹聟</div><div class="empty-text">No hay tareas.<br>Toc脙隆 + para crear.</div></div>':TA.map(tI).join(''));
}

function tpI(t){return t==='empresa'?'冒聼聫垄':t==='barrio'?'冒聼聫聵茂赂聫':'冒聼聭陇';}
function tpL(t){return t==='empresa'?'Empresa':t==='barrio'?'Barrio/Consorcio':'Persona f脙颅sica';}

function rClientes(){
  return '<div class="section-title">Clientes ('+CL.length+')</div>'+
    (CL.length===0?'<div class="empty"><div class="empty-icon">冒聼聭陇</div><div class="empty-text">No hay clientes.<br>Toc脙隆 + para agregar.</div></div>':
    CL.map(c=>{
      const tp=c.tipo_cliente||'persona';
      const ct=c.contacto_nombre?
        '<div class="contact-card">'+
          '<div class="contact-row">冒聼聭陇 <b>'+c.contacto_nombre+'</b>'+(c.contacto_cargo?' 芒聙聰 '+c.contacto_cargo:'')+'</div>'+
          (c.contacto_telefono?'<div class="contact-row">冒聼聯聻 '+c.contacto_telefono+'</div>':'')+
          (c.contacto_email?'<div class="contact-row">芒聹聣茂赂聫 '+c.contacto_email+'</div>':'')+
        '</div>':'';
      return '<div class="card">'+
        '<div class="card-header">'+
          '<div><div class="card-title">'+tpI(tp)+' '+c.nombre+'</div><div class="card-sub">'+(c.direccion||'Sin direcci脙鲁n')+'</div></div>'+
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'+
            '<span class="badge '+(c.estado==='Activo'?'badge-active':'badge-paused')+'">'+(c.estado||'Activo')+'</span>'+
            '<span class="badge badge-type">'+tpL(tp)+'</span>'+
          '</div>'+
        '</div>'+
        (tp==='persona'?'<div class="card-body">'+(c.telefono?'冒聼聯聻 '+c.telefono:'')+(c.email?' 脗路 芒聹聣茂赂聫 '+c.email:'')+'</div>':ct)+
        '<div style="margin-top:10px;display:flex;gap:8px">'+
          '<button class="btn btn-sm btn-secondary" onclick="edC(\''+c.id+'\')">芒聹聫茂赂聫 Editar</button>'+
          '<button class="btn btn-sm btn-primary" onclick="nTC(\''+c.id+'\')">+ Tarea</button>'+
        '</div></div>';
    }).join(''));
}

function rEquipo(){
  return '<div class="section-title">Equipo ('+US.length+')</div>'+
    (US.length===0?'<div class="empty"><div class="empty-icon">冒聼聭路</div><div class="empty-text">No hay equipo.<br>Toc脙隆 + para agregar.</div></div>':
    US.map(u=>
      '<div class="card">'+
        '<div class="card-header">'+
          '<div><div class="card-title">'+u.nombre+'</div><div class="card-sub">'+(u.roles?.nombre||'Sin rol')+(u.celula?' 脗路 C脙漏lula: '+u.celula:'')+'</div></div>'+
          '<div style="display:flex;gap:6px;align-items:center">'+
            '<span class="badge '+(u.activo?'badge-active':'badge-paused')+'">'+(u.activo?'Activo':'Inactivo')+'</span>'+
            '<button class="btn btn-sm btn-secondary" onclick="edU(\''+u.id+'\')">芒聹聫茂赂聫</button>'+
          '</div>'+
        '</div>'+
        (u.telefono||u.email?'<div class="card-body">'+(u.telefono?'冒聼聯聻 '+u.telefono:'')+(u.email?' 脗路 芒聹聣茂赂聫 '+u.email:'')+'</div>':'')+
      '</div>'
    ).join(''));
}

function openFab(){
  if(tab==='tareas'||tab==='dashboard')mT();
  else if(tab==='clientes')mC();
  else if(tab==='equipo')mU();
}
function openM(h){document.getElementById('modal-content').innerHTML=h;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');}

function selTp(t){
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('tp-'+t).classList.add('selected');
  document.getElementById('fp').classList.toggle('hidden',t!=='persona');
  document.getElementById('fe').classList.toggle('hidden',t!=='empresa');
  document.getElementById('fb').classList.toggle('hidden',t!=='barrio');
  document.getElementById('htp').value=t;
}

function tpSel(s){s=s||'persona';return '<input type="hidden" id="htp" value="'+s+'"><div class="type-selector">'+
  '<button type="button" class="type-btn '+(s==='persona'?'selected':'')+'" id="tp-persona" onclick="selTp(\'persona\')"><span class="type-icon">冒聼聭陇</span>Persona</button>'+
  '<button type="button" class="type-btn '+(s==='empresa'?'selected':'')+'" id="tp-empresa" onclick="selTp(\'empresa\')"><span class="type-icon">冒聼聫垄</span>Empresa</button>'+
  '<button type="button" class="type-btn '+(s==='barrio'?'selected':'')+'" id="tp-barrio" onclick="selTp(\'barrio\')"><span class="type-icon">冒聼聫聵茂赂聫</span>Barrio</button>'+
'</div>';}

function fP(c){c=c||{};return '<div id="fp"><div class="form-row">'+
  '<div class="form-group"><label class="form-label">Tel脙漏fono</label><input class="form-control" id="f-tel" type="tel" value="'+(c.telefono||'')+'"></div>'+
  '<div class="form-group"><label class="form-label">Email</label><input class="form-control" id="f-email" type="email" value="'+(c.email||'')+'"></div>'+
'</div></div>';}

function fE(c){c=c||{};return '<div id="fe"><div class="section-divider">Contacto en la empresa</div>'+
  '<div class="form-group"><label class="form-label">Nombre del contacto</label><input class="form-control" id="f-cn" value="'+(c.contacto_nombre||'')+'"></div>'+
  '<div class="form-group"><label class="form-label">Cargo</label><input class="form-control" id="f-cc" value="'+(c.contacto_cargo||'')+'"></div>'+
  '<div class="form-row">'+
    '<div class="form-group"><label class="form-label">Tel脙漏fono</label><input class="form-control" id="f-ct" type="tel" value="'+(c.contacto_telefono||'')+'"></div>'+
    '<div class="form-group"><label class="form-label">Email</label><input class="form-control" id="f-ce" type="email" value="'+(c.contacto_email||'')+'"></div>'+
  '</div></div>';}

function fB(c){c=c||{};return '<div id="fb"><div class="section-divider">Datos del administrador</div>'+
  '<div class="form-group"><label class="form-label">Nombre del administrador</label><input class="form-control" id="f-cn" value="'+(c.contacto_nombre||'')+'"></div>'+
  '<div class="form-row">'+
    '<div class="form-group"><label class="form-label">Tel脙漏fono</label><input class="form-control" id="f-ct" type="tel" value="'+(c.contacto_telefono||'')+'"></div>'+
    '<div class="form-group"><label class="form-label">Email</label><input class="form-control" id="f-ce" type="email" value="'+(c.contacto_email||'')+'"></div>'+
  '</div>'+
  '<div class="form-group"><label class="form-label">Dir. administraci脙鲁n</label><input class="form-control" id="f-da" value="'+(c.dir_administracion||'')+'"></div>'+
'</div>';}

function mC(c){
  var ie=!!c,tp=(c&&c.tipo_cliente)||'persona';
  var uo=US.map(u=>'<option value="'+u.id+'"'+(c&&c.responsable_id===u.id?' selected':'')+'>'+u.nombre+'</option>').join('');
  openM(
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">'+
      '<div class="modal-title" style="margin:0">'+(ie?'Editar':'Nuevo')+' cliente</div>'+
      '<button class="modal-close" onclick="closeModal()">芒聹聲</button>'+
    '</div>'+
    '<div class="form-group"><label class="form-label">Nombre / Raz脙鲁n social *</label><input class="form-control" id="f-nom" value="'+(c?c.nombre:'')+'"></div>'+
    '<div class="form-group"><label class="form-label">Tipo de cliente</label>'+tpSel(tp)+'</div>'+
    fP(c)+fE(c)+fB(c)+
    '<div class="form-group"><label class="form-label">Direcci脙鲁n del servicio</label><input class="form-control" id="f-dir" value="'+(c?c.direccion||'':'')+'"></div>'+
    '<div class="form-group"><label class="form-label">Responsable interno</label><select class="form-control" id="f-resp"><option value="">Sin asignar</option>'+uo+'</select></div>'+
    '<div class="form-group"><label class="form-label">Estado</label><select class="form-control" id="f-est">'+
      '<option'+((!c||c.estado==='Activo')?' selected':'')+'>Activo</option>'+
      '<option'+(c&&c.estado==='Prospecto'?' selected':'')+'>Prospecto</option>'+
      '<option'+(c&&c.estado==='Pausado'?' selected':'')+'>Pausado</option>'+
      '<option'+(c&&c.estado==='Baja'?' selected':'')+'>Baja</option>'+
    '</select></div>'+
    '<div class="form-group"><label class="form-label">Notas</label><textarea class="form-control" id="f-not" rows="2">'+(c?c.notas||'':'')+'</textarea></div>'+
    '<div class="form-actions">'+
      (ie?'<button class="btn btn-danger" onclick="delC(\''+c.id+'\')">冒聼聴聭</button>':'')+
      '<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>'+
