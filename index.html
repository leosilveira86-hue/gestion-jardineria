.tst.show{opacity:1}
</style>

var TAB='d',CL=[],US=[],SV=[],TA=[],RO=[],CAL=0,NON=false;
async function api(p,m,b){m=m||'GET';var o={method:m,headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':m==='POST'?'return=representation':''}};if(b)o.body=JSON.stringify(b);var r=await fetch(SB+'/rest/v1/'+p,o);if(!r.ok)throw new Error(await r.text());if(r.status===204)return[];return r.json();}

function rD(){var p=TA.filter(function(t){return t.estado==='Pendiente';}).length,d=TA.filter(function(t){return t.estado==='Completado';}).length,hoy=new Date().toISOString().split('T')[0],hT=TA.filter(function(t){return t.fecha_programada===hoy;}),ip=TA.filter(function(t){return t.estado==='En progreso';});var h='<div class="sgr"><div class="sc"><div class="sn">'+CL.length+'</div><div class="sl">Clientes</div></div><div class="sc"><div class="sn">'+TA.length+'</div><div class="sl">Tareas</div></div><div class="sc"><div class="sn" style="color:var(--wn)">'+p+'</div><div class="sl">Pendientes</div></div><div class="sc"><div class="sn">'+d+'</div><div class="sl">Completadas</div></div></div><div class="stl">Tareas de hoy</div>';h+=hT.length===0?'<div class="empty"><div class="etxt">No hay tareas para hoy</div></div>':hT.map(tI).join('');if(ip.length>0)h+='<div class="stl" style="margin-top:16px">En progreso</div>'+ip.map(tI).join('');return h;}
function tI(t){var cls=t.estado==='Completado'?'done':'',bc=t.estado==='Pendiente'?'bp':t.estado==='En progreso'?'bgr':'bd',cl=t.clientes&&t.clientes.nombre?t.clientes.nombre:'-',us=t.usuarios&&t.usuarios.nombre?t.usuarios.nombre:'Sin asignar',me=cl+' - '+us+(t.hora_inicio?' - '+t.hora_inicio.slice(0,5):'')+(t.duracion_hs?' - '+t.duracion_hs+'hs':'');var h='<div class="ti"><div class="tck '+cls+'" onclick="tog(\''+t.id+'\',\''+t.estado+'\')">'+(t.estado==='Completado'?'v':'')+'</div><div class="tin"><div class="ttl">'+t.titulo+'</div><div class="tmeta">'+me+'</div><span class="badge '+bc+'">'+t.estado+'</span></div><button class="btn btns btnsm" onclick="eT(\''+t.id+'\')">[e]</button></div>';return h;}
var DAYS=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'],MONS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function wD(off){var n=new Date(),day=n.getDay(),mon=new Date(n);mon.setDate(n.getDate()-(day===0?6:day-1)+(off*7));return[0,1,2,3,4,5,6].map(function(i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}

function dCal(){var dates=wD(CAL),today=fd(new Date()),SL=52,ST=7;var ti=dates.findIndex(function(d){return fd(d)===today;});if(ti>=0){var now=new Date(),tp=((now.getHours()-ST)*60+now.getMinutes())/60*SL;var fc=document.getElementById('cc-'+ti+'-'+ST);if(fc){var nl=document.createElement('div');nl.className='cnow';nl.style.top=tp+'px';fc.parentElement.style.position='relative';fc.parentElement.appendChild(nl);}}TA.forEach(function(t){if(!t.fecha_programada||!t.hora_inicio)return;var di=dates.findIndex(function(d){return fd(d)===t.fecha_programada;});if(di<0)return;var p=t.hora_inicio.split(':'),hh=parseInt(p[0]),mm=parseInt(p[1]),dur=parseFloat(t.duracion_hs)||1,tp2=((hh-ST)*60+mm)/60*SL,ht=Math.max(18,dur*SL),sh=Math.min(19,Math.max(ST,hh)),cell=document.getElementById('cc-'+di+'-'+sh);if(!cell)return;var off=tp2-((sh-ST)*SL),cls=t.estado==='Completado'?'evd':t.estado==='En progreso'?'evg':'evp',el=document.createElement('div');el.className='cev '+cls;el.style.cssText='top:'+off+'px;height:'+ht+'px;';var who=t.usuarios&&t.usuarios.nombre?t.usuarios.nombre:'';el.innerHTML='<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.titulo+'</div>';if(who)el.innerHTML+='<div style="opacity:.8;font-weight:400">'+who+'</div>';var tid=t.id;el.onclick=function(){eT(tid);};cell.appendChild(el);});}

function tpSel(s){s=s||'persona';var h='<input type="hidden" id="htp" value="'+s+'"><div class="tps"><button type="button" class="tpb '+(s==='persona'?'sel':'')+'" id="tp-persona" onclick="selTp(\'persona\')"><span class="tpico">P</span>Persona</button><button type="button" class="tpb '+(s==='empresa'?'sel':'')+'" id="tp-empresa" onclick="selTp(\'empresa\')"><span class="tpico">E</span>Empresa</button><button type="button" class="tpb '+(s==='barrio'?'sel':'')+'" id="tp-barrio" onclick="selTp(\'barrio\')"><span class="tpico">B</span>Barrio</button></div>';return h;}
function fP(c){c=c||{};return '<div id="fp"><div class="frw"><div class="fg"><label class="fl">Telefono</label><input class="fc" id="f-tel" type="tel" value="'+(c.telefono||'')+'"></div><div class="fg"><label class="fl">Email</label><input class="fc" id="f-email" type="email" value="'+(c.email||'')+'"></div></div></div>';}
function fE(c){c=c||{};return '<div id="fe"><div class="sdv">Contacto empresa</div><div class="fg"><label class="fl">Nombre contacto</label><input class="fc" id="f-cn" value="'+(c.contacto_nombre||'')+'"></div><div class="fg"><label class="fl">Cargo</label><input class="fc" id="f-cc" value="'+(c.contacto_cargo||'')+'"></div><div class="frw"><div class="fg"><label class="fl">Telefono</label><input class="fc" id="f-ct" type="tel" value="'+(c.contacto_telefono||'')+'"></div><div class="fg"><label class="fl">Email</label><input class="fc" id="f-ce" type="email" value="'+(c.contacto_email||'')+'"></div></div></div>';}
function fB(c){c=c||{};return '<div id="fb"><div class="sdv">Administrador</div><div class="fg"><label class="fl">Nombre</label><input class="fc" id="f-cn" value="'+(c.contacto_nombre||'')+'"></div><div class="frw"><div class="fg"><label class="fl">Telefono</label><input class="fc" id="f-ct" type="tel" value="'+(c.contacto_telefono||'')+'"></div><div class="fg"><label class="fl">Email</label><input class="fc" id="f-ce" type="email" value="'+(c.contacto_email||'')+'"></div></div><div class="fg"><label class="fl">Dir. admin</label><input class="fc" id="f-da" value="'+(c.dir_administracion||'')+'"></div></div>';}
function gv(id){var el=document.getElementById(id);return el?el.value||null:null;}
function gcf(tp){if(tp==='persona')return{telefono:gv('f-tel'),email:gv('f-email'),contacto_nombre:null,contacto_cargo:null,contacto_telefono:null,contacto_email:null,dir_administracion:null};if(tp==='empresa')return{telefono:null,email:null,contacto_nombre:gv('f-cn'),contacto_cargo:gv('f-cc'),contacto_telefono:gv('f-ct'),contacto_email:gv('f-ce'),dir_administracion:null};return{telefono:null,email:null,contacto_nombre:gv('f-cn'),contacto_cargo:null,contacto_telefono:gv('f-ct'),contacto_email:gv('f-ce'),dir_administracion:gv('f-da')};}
function mT(cid){cid=cid||'';var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div class="mtl">Nueva tarea</div><button class="mcl" onclick="cMo()">x</button></div>';h+='<div class="fg"><label class="fl">Titulo</label><input class="fc" id="f-tit"></div>';var co=CL.map(function(c){return '<option value="'+c.id+'"'+(c.id===cid?' selected':'')+'>'+c.nombre+'</option>';}).join('');h+='<div class="fg"><label class="fl">Cliente</label><select class="fc" id="f-cli"><option value="">Sin cliente</option>'+co+'</select></div>';var so=SV.map(function(s){return '<option value="'+s.id+'">'+s.nombre+'</option>';}).join('');h+='<div class="fg"><label class="fl">Servicio</label><select class="fc" id="f-srv"><option value="">Seleccionar</option>'+so+'</select></div>';var uo=US.map(function(u){return '<option value="'+u.id+'">'+u.nombre+'</option>';}).join('');h+='<div class="fg"><label class="fl">Asignar a</label><select class="fc" id="f-asi"><option value="">Sin asignar</option>'+uo+'</select></div>';var hoy=new Date().toISOString().split('T')[0];h+='<div class="frw"><div class="fg"><label class="fl">Fecha</label><input class="fc" id="f-fec" type="date" value="'+hoy+'"></div><div class="fg"><label class="fl">Hora</label><input class="fc" id="f-hor" type="time"></div></div>';h+='<div class="fg"><label class="fl">Duracion (hs)</label><input class="fc" id="f-dur" type="number" min="0.5" max="12" step="0.5" placeholder="Ej: 2"></div>';h+='<div class="fg"><label class="fl">Observaciones</label><textarea class="fc" id="f-obs" rows="2"></textarea></div>';h+='<div class="fac"><button class="btn btns" onclick="cMo()">Cancelar</button><button class="btn btnp" onclick="svT()">Guardar</button></div>';oM(h);}
function eT(id){var t=TA.find(function(x){return x.id===id;});if(!t)return;var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div class="mtl">Editar tarea</div><button class="mcl" onclick="cMo()">x</button></div>';h+='<div class="fg"><label class="fl">Titulo</label><input class="fc" id="f-tit" value="'+t.titulo+'"></div>';var co=CL.map(function(c){return '<option value="'+c.id+'"'+(c.id===t.cliente_id?' selected':'')+'>'+c.nombre+'</option>';}).join('');h+='<div class="fg"><label class="fl">Cliente</label><select class="fc" id="f-cli"><option value="">Sin cliente</option>'+co+'</select></div>';var uo=US.map(function(u){return '<option value="'+u.id+'"'+(u.id===t.asignado_a?' selected':'')+'>'+u.nombre+'</option>';}).join('');h+='<div class="fg"><label class="fl">Asignar a</label><select class="fc" id="f-asi"><option value="">Sin asignar</option>'+uo+'</select></div>';h+='<div class="frw"><div class="fg"><label class="fl">Fecha</label><input class="fc" id="f-fec" type="date" value="'+(t.fecha_programada||'')+'"></div><div class="fg"><label class="fl">Hora</label><input class="fc" id="f-hor" type="time" value="'+(t.hora_inicio?t.hora_inicio.slice(0,5):'')+'"></div></div>';h+='<div class="fg"><label class="fl">Duracion (hs)</label><input class="fc" id="f-dur" type="number" min="0.5" max="12" step="0.5" value="'+(t.duracion_hs||'')+'"></div>';h+='<div class="fg"><label class="fl">Estado</label><select class="fc" id="f-est"><option'+(t.estado==='Pendiente'?' selected':'')+'>Pendiente</option><option'+(t.estado==='En progreso'?' selected':'')+'>En progreso</option><option'+(t.estado==='Completado'?' selected':'')+'>Completado</option></select></div>';h+='<div class="fg"><label class="fl">Observaciones</label><textarea class="fc" id="f-obs" rows="2">'+(t.observaciones||'')+'</textarea></div>';h+='<div class="fac"><button class="btn btnd" onclick="dT(\''+id+'\')">Eliminar</button><button class="btn btnp" onclick="uT(\''+id+'\')">Guardar</button></div>';oM(h);}
function mCL(c){var ie=!!c,tp=c&&c.tipo_cliente||'persona';var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div class="mtl">'+(ie?'Editar':'Nuevo')+' cliente</div><button class="mcl" onclick="cMo()">x</button></div>';h+='<div class="fg"><label class="fl">Nombre</label><input class="fc" id="f-nom" value="'+(c?c.nombre:'')+'"></div>';h+='<div class="fg"><label class="fl">Tipo</label>'+tpSel(tp)+'</div>';h+=fP(c)+fE(c)+fB(c);h+='<div class="fg"><label class="fl">Direccion</label><input class="fc" id="f-dir" value="'+(c?c.direccion||'':'')+'"></div>';var uo=US.map(function(u){return '<option value="'+u.id+'"'+(c&&c.responsable_id===u.id?' selected':'')+'>'+u.nombre+'</option>';}).join('');h+='<div class="fg"><label class="fl">Responsable</label><select class="fc" id="f-resp"><option value="">Sin asignar</option>'+uo+'</select></div>';h+='<div class="fg"><label class="fl">Estado</label><select class="fc" id="f-est"><option'+((!c||c.estado==='Activo')?' selected':'')+'>Activo</option><option'+(c&&c.estado==='Prospecto'?' selected':'')+'>Prospecto</option><option'+(c&&c.estado==='Pausado'?' selected':'')+'>Pausado</option><option'+(c&&c.estado==='Baja'?' selected':'')+'>Baja</option></select></div>';h+='<div class="fg"><label class="fl">Notas</label><textarea class="fc" id="f-not" rows="2">'+(c?c.notas||'':'')+'</textarea></div>';h+='<div class="fac">';if(ie)h+='<button class="btn btnd" onclick="dCL(\''+c.id+'\')">Eliminar</button>';h+='<button class="btn btns" onclick="cMo()">Cancelar</button><button class="btn btnp" onclick="'+(ie?'uCL(\''+c.id+'\')':'svCL()')+'">Guardar</button></div>';oM(h);selTp(tp);}
function eCL(id){var c=CL.find(function(x){return x.id===id;});if(c)mCL(c);}
function nTC(id){mT(id);}
function mU(u){var ie=!!u;var ro=RO.map(function(r){return '<option value="'+r.id+'"'+(u&&u.rol_id===r.id?' selected':'')+'>'+r.nombre+'</option>';}).join('');var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div class="mtl">'+(ie?'Editar':'Nuevo')+' integrante</div><button class="mcl" onclick="cMo()">x</button></div>';h+='<div class="fg"><label class="fl">Nombre</label><input class="fc" id="f-nom" value="'+(u?u.nombre:'')+'"></div>';h+='<div class="fg"><label class="fl">Rol</label><select class="fc" id="f-rol">'+ro+'</select></div>';h+='<div class="fg"><label class="fl">Celula</label><input class="fc" id="f-cel" value="'+(u?u.celula||'':'')+'"></div>';h+='<div class="frw"><div class="fg"><label class="fl">Telefono</label><input class="fc" id="f-tel" type="tel" value="'+(u?u.telefono||'':'')+'"></div><div class="fg"><label class="fl">Email</label><input class="fc" id="f-email" type="email" value="'+(u?u.email||'':'')+'"></div></div>';if(ie){h+='<div class="fg"><label class="fl">Estado</label><select class="fc" id="f-act"><option value="true"'+(u&&u.activo!==false?' selected':'')+'>Activo</option><option value="false"'+(u&&u.activo===false?' selected':'')+'>Inactivo</option></select></div>';}h+='<div class="fac">';if(ie)h+='<button class="btn btnd" onclick="dU(\''+u.id+'\')">Eliminar</button>';h+='<button class="btn btns" onclick="cMo()">Cancelar</button><button class="btn btnp" onclick="'+(ie?'uU(\''+u.id+'\')':'svU()')+'">Guardar</button></div>';oM(h);}
function eU(id){var u=US.find(function(x){return x.id===id;});if(u)mU(u);}
async function svT(){var t=document.getElementById('f-tit').value.trim();if(!t)return alert('Titulo obligatorio');var asig=gv('f-asi'),fec=gv('f-fec'),hor=gv('f-hor');try{await api('tareas','POST',{titulo:t,cliente_id:gv('f-cli'),servicio_id:gv('f-srv'),asignado_a:asig,fecha_programada:fec,hora_inicio:hor,duracion_hs:gv('f-dur')?parseFloat(gv('f-dur')):null,observaciones:gv('f-obs'),estado:'Pendiente'});cMo();await load();rdr();shT('Tarea guardada');var q=US.find(function(u){return u.id===asig;});sndN('Nueva tarea',t+' - '+(q?q.nombre:'equipo'));}catch(e){alert('Error: '+e.message);}}
async function uT(id){var est=document.getElementById('f-est').value;try{await api('tareas?id=eq.'+id,'PATCH',{titulo:document.getElementById('f-tit').value,cliente_id:gv('f-cli'),asignado_a:gv('f-asi'),fecha_programada:gv('f-fec'),hora_inicio:gv('f-hor'),duracion_hs:gv('f-dur')?parseFloat(gv('f-dur')):null,estado:est,observaciones:gv('f-obs')});cMo();await load();rdr();shT('Actualizado');if(est==='Completado')sndN('Tarea completada','Una tarea fue completada');}catch(e){alert('Error: '+e.message);}}
async function dT(id){if(!confirm('Eliminar tarea?'))return;try{await api('tareas?id=eq.'+id,'DELETE');cMo();await load();rdr();}catch(e){alert('Error: '+e.message);}}
async function tog(id,est){var n=est==='Pendiente'?'En progreso':est==='En progreso'?'Completado':'Pendiente';try{await api('tareas?id=eq.'+id,'PATCH',{estado:n});await load();rdr();}catch(e){alert('Error: '+e.message);}}
async function svCL(){var n=document.getElementById('f-nom').value.trim();if(!n)return alert('Nombre obligatorio');var tp=document.getElementById('htp').value,cf=gcf(tp);cf.nombre=n;cf.tipo_cliente=tp;cf.direccion=gv('f-dir');cf.responsable_id=gv('f-resp');cf.estado=document.getElementById('f-est').value;cf.notas=gv('f-not');try{await api('clientes','POST',cf);cMo();await load();rdr();shT('Cliente guardado');}catch(e){alert('Error: '+e.message);}}
async function uCL(id){var n=document.getElementById('f-nom').value.trim();if(!n)return alert('Nombre obligatorio');var tp=document.getElementById('htp').value,cf=gcf(tp);cf.nombre=n;cf.tipo_cliente=tp;cf.direccion=gv('f-dir');cf.estado=document.getElementById('f-est').value;cf.notas=gv('f-not');try{await api('clientes?id=eq.'+id,'PATCH',cf);cMo();await load();rdr();shT('Actualizado');}catch(e){alert('Error: '+e.message);}}
async function dCL(id){if(!confirm('Eliminar?'))return;try{await api('clientes?id=eq.'+id,'DELETE');cMo();await load();rdr();}catch(e){alert('Error: '+e.message);}}
async function svU(){var n=document.getElementById('f-nom').value.trim();if(!n)return alert('Nombre obligatorio');try{await api('usuarios','POST',{nombre:n,rol_id:gv('f-rol'),celula:gv('f-cel'),telefono:gv('f-tel'),email:gv('f-email')});cMo();await load();rdr();shT('Guardado');}catch(e){alert('Error: '+e.message);}}
async function uU(id){var n=document.getElementById('f-nom').value.trim();if(!n)return alert('Nombre obligatorio');try{await api('usuarios?id=eq.'+id,'PATCH',{nombre:n,rol_id:gv('f-rol'),celula:gv('f-cel'),telefono:gv('f-tel'),email:gv('f-email'),activo:document.getElementById('f-act').value==='true'});cMo();await load();rdr();shT('Actualizado');}catch(e){alert('Error: '+e.message);}}
async function dU(id){if(!confirm('Eliminar?'))return;try{await api('usuarios?id=eq.'+id,'DELETE');cMo();await load();rdr();}catch(e){alert('Error: '+e.message);}}
(async function(){await load();rdr();})();
</script>
